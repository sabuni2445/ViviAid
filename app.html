<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViviAid Buddy AI | Live Prototype</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --accent: #00e5ff;
            --accent-purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Camera Feed Viewport */
        #viewport-container {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Mirror for selfie, but we'll use back cam */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* UI Overlays */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .bottom-controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            pointer-events: auto;
        }

        .speech-indicator {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .current-object {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Outfit';
            color: white;
            margin-bottom: 4px;
        }

        .amharic-label {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: 400;
        }

        .btn-start {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-purple));
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            font-family: 'Outfit';
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--glass);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-family: 'Outfit';
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--accent);
        }

        #error-msg {
            display: none;
            color: #ff4d4d;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="loading-spinner"></div>
        <p class="loading-text">Initialising Buddy AI...</p>
    </div>

    <div id="viewport-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>

        <div class="ui-overlay">
            <div class="header">
                <div class="status-badge" id="model-status">
                    <div class="pulse" style="background: #ffcc00; box-shadow: 0 0 10px #ffcc00;"></div>
                    <span>MODEL: LOADING</span>
                </div>
                <div class="status-badge" style="color: #eee;">
                    <i class="fas fa-signal"></i> EDGE
                </div>
            </div>

            <div id="error-msg"></div>

            <div class="bottom-controls">
                <div class="speech-indicator" id="info-box" style="display: none;">
                    <div class="current-object" id="obj-en">Waiting...</div>
                    <div class="amharic-label" id="obj-am">በመጥበቅ ላይ...</div>
                </div>
                <button id="btn-action" class="btn-start" onclick="toggleAI()">START BUDDY AI</button>
            </div>
        </div>
    </div>

    <!-- AI Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="app.js"></script>
</body>

</html>
