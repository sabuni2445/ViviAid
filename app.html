<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViviAid Buddy AI | Pilot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --accent: #00e5ff;
            --purple: #7000ff;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #viewport {
            position: relative;
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ffcc00;
        }

        .controls {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .obj-en {
            font-family: 'Outfit';
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
        }

        .obj-am {
            font-size: 1.2rem;
            color: var(--accent);
            margin-top: 5px;
        }

        .btn-start {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            color: white;
            font-weight: 800;
            font-family: 'Outfit';
            font-size: 1rem;
            cursor: pointer;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 2px;
        }

        #error-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            z-index: 2000;
            display: none;
            text-align: center;
            width: 80%;
        }
    </style>
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
        <p class="loading-text">WAKING UP BUDDY...</p>
    </div>
    <div id="error-msg"></div>
    <div id="viewport">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div class="ui-overlay">
            <div class="header" style="display: flex; gap: 10px;">
                <div class="status-badge" id="model-status">
                    <div class="pulse"></div>
                    <span>BUDDY: LOADING</span>
                </div>
            </div>
            <div class="controls">
                <div class="bubble" id="info-box" style="display: none;">
                    <div class="obj-en" id="obj-en">SCANNING...</div>
                    <div class="obj-am" id="obj-am">በመፈለግ ላይ...</div>
                </div>
                <button id="btn-action" class="btn-start" onclick="toggleAI()">START BUDDY AI</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
